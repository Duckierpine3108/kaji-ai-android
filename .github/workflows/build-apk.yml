name: Build KAJI AI APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('android/**/*.gradle*', 'android/**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Download real Gradle wrapper jar
        run: |
          wget -q https://raw.githubusercontent.com/nickelc/modio-rs/master/gradle/wrapper/gradle-wrapper.jar \
            -O android/gradle/wrapper/gradle-wrapper.jar || \
          curl -sL https://raw.githubusercontent.com/nickelc/modio-rs/master/gradle/wrapper/gradle-wrapper.jar \
            -o android/gradle/wrapper/gradle-wrapper.jar
          ls -lh android/gradle/wrapper/

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build Debug APK
        run: cd android && ./gradlew assembleDebug --no-daemon --info
        env:
          ANDROID_HOME: /usr/local/lib/android/sdk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: KAJI-AI-v7-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
